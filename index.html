<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>招標網資料自動抓取器</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
</head>

<body>
    <div class="background-elements">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
    </div>

    <div class="container glass-panel">
        <header>
            <h1>招標網資料抓取器</h1>
            <p class="subtitle">輸入招標網址，系統將自動解析並寫入您的Google試算表</p>
            <div class="view-switch">
                <button id="view-card-btn" class="switch-btn">📱 卡片佈局</button>
                <button id="view-map-btn" class="switch-btn">🗺️ 地圖模式</button>
                <button id="view-list-btn" class="switch-btn">📋 資料列表</button>
            </div>
        </header>

        <div id="input-section">
            <form id="scraper-form">
                <div class="input-group">
                    <label for="tender-url">請輸入標案網址 (可多筆貼上，每行一筆)</label>
                    <textarea id="tender-url" placeholder="https://web.pcc.gov.tw/..." required autocomplete="off" rows="3"></textarea>
                    <div class="input-border"></div>
                </div>

                <button type="submit" id="submit-btn" class="btn-primary">
                    <span class="btn-text">一鍵抓取並寫入</span>
                    <span class="btn-loader loader-hidden">
                        <svg class="spinner" viewBox="0 0 50 50">
                            <circle class="path" cx="25" cy="25" r="20" fill="none" stroke-width="5"></circle>
                        </svg>
                    </span>
                </button>
            </form>

            <div id="status-message" class="status-box hidden">
                <!-- 訊息將在此顯示 -->
            </div>

            <div id="progress-container" class="progress-container hidden">
                <div id="progress-bar" class="progress-bar"></div>
            </div>
        </div>

        <div id="history-container" class="history-container">
            <div class="history-header">
                <h3><span class="pulse-dot"></span>試算表即時連動紀錄</h3>
                <div class="header-actions">
                    <div id="map-controls" class="filter-container hidden">
                        <button id="get-location-btn" class="btn-secondary btn-sm">📍 抓取我的定位</button>
                        <select id="marker-type-filter" class="custom-select">
                            <option value="all">📍 顯示全部地址</option>
                            <option value="agency">🏢 僅機關地址</option>
                            <option value="vendor">🏗️ 僅廠商地址</option>
                        </select>
                    </div>
                    <div class="filter-container list-controls">
                        <label for="category-filter">類別：</label>
                        <select id="category-filter" class="custom-select">
                            <option value="all" selected>全部</option>
                            <option value="reinforce">補強</option>
                            <option value="road">道路</option>
                            <option value="repair">修復</option>
                            <option value="waterproof">防水</option>
                            <option value="other">其他</option>
                        </select>
                    </div>
                    <div class="filter-container">
                        <label for="performance-filter">履約地點：</label>
                        <select id="performance-filter" class="custom-select">
                            <option value="all" selected>全部</option>
                            <option value="taipei">台北市</option>
                            <option value="new_taipei">新北市</option>
                            <option value="taoyuan">桃園市</option>
                            <option value="hsinchu">新竹縣市</option>
                            <option value="other">其他</option>
                        </select>
                    </div>
                    <div class="filter-container">
                        <label for="agency-filter">機關：</label>
                        <select id="agency-filter" class="custom-select">
                            <option value="all" selected>全部</option>
                            <option value="taipei">台北市</option>
                            <option value="new_taipei">新北市</option>
                            <option value="taoyuan">桃園市</option>
                            <option value="hsinchu">新竹縣市</option>
                            <option value="other">其他</option>
                        </select>
                    </div>
                    <div class="filter-container">
                        <label for="vendor-filter">廠商：</label>
                        <select id="vendor-filter" class="custom-select">
                            <option value="all" selected>全部</option>
                            <option value="taipei">台北市</option>
                            <option value="new_taipei">新北市</option>
                            <option value="taoyuan">桃園市</option>
                            <option value="hsinchu">新竹縣市</option>
                            <option value="other">其他</option>
                        </select>
                    </div>
                    <div class="sort-container">
                        <label for="sort-select">排序：</label>
                        <select id="sort-select" class="custom-select">
                            <option value="default" selected>存入時間</option>
                            <option value="post_date">公告日</option>
                            <option value="start_date">開始日</option>
                            <option value="end_date">結束日</option>
                            <option value="agency_address">機關地址</option>
                            <option value="vendor_address">廠商地址</option>
                            <option value="performance_address">履約地點</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="table-wrapper history-wrapper">
                <table id="history-table">
                    <thead id="history-head">
                        <!-- 標題將動態產生 -->
                    </thead>
                    <tbody id="history-body">
                        <tr>
                            <td colspan="100%" class="text-center loading-text">努力載入雲端資料中...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
            
            <div id="card-wrapper" class="card-wrapper hidden">
                <!-- 卡片將在此動態產生 -->
            </div>
            <div id="map-wrapper" class="hidden">
                <div id="map" style="height: 500px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);"></div>
                <div class="map-legend">
                    <span class="legend-item"><span class="legend-info legend-me"></span> 我的位置</span>
                    <span class="legend-item"><span class="legend-info legend-agency"></span> 機關地址</span>
                    <span class="legend-item"><span class="legend-info legend-vendor"></span> 廠商地址</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Instructions Modal or Section for GAS -->
    <div class="help-section">
        <p>若需要最新支援，請參考 <a href="GAS_Script.js" target="_blank">GAS_Script.js</a> 並貼上至您的 Google App Script 編輯器。</p>
    </div>

    <script src="script.js"></script>
</body>

</html>
